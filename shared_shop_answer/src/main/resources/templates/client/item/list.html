<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.list}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body th:object="${loginForm}">

	<div class="mb-6 border-l-4 border-futureBlue pl-4">
		<h2 class="text-2xl font-bold text-white tracking-wider" th:text="#{item}+#{title.list}"></h2>
	</div>

	<div class="mb-8 flex gap-4 text-sm bg-futureCard/50 p-4 rounded-lg border border-futureBlue/10 w-fit">
		<span th:if="${sortType==1}" class="text-futureBlue font-bold" th:text="#{sort.latest.str}"></span>
		<a th:unless="${sortType==1}" th:href="@{/client/item/list/1(categoryId=${categoryId})}" class="text-slate-400 hover:text-white transition-colors" th:text="#{sort.latest.str}"></a>
		<span class="text-slate-600">|</span>
		<span th:if="${sortType==2}" class="text-futureBlue font-bold" th:text="#{sort.hotsell.str}"></span>
		<a th:unless="${sortType==2}" th:href="@{/client/item/list/2(categoryId=${categoryId})}" class="text-slate-400 hover:text-white transition-colors" th:text="#{sort.hotsell.str}"></a>
	</div>

	<div th:if="${#lists.isEmpty(items)}" class="bg-futureCard border border-futureBlue/30 p-8 rounded-xl text-center">
		<p class="text-slate-400" th:text="#{msg.client.item.list.none}"></p>
	</div>

	<th:block th:if="!${#lists.isEmpty(items)}">
		<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
			<th:block th:each="item, status: ${items}">
				<!--/* 1件分の商品情報 */-->
				<div class="group relative flex flex-col bg-futureCard backdrop-blur-md rounded-xl border border-futureBlue/20 overflow-hidden hover:border-futureBlue/80 hover:shadow-[0_0_20px_rgba(0,240,255,0.3)] hover:-translate-y-2 transition-all duration-300">
					<div class="p-4 border-b border-futureBlue/10 bg-white/5 z-10 flex justify-between items-center gap-2">
						<h3 class="font-bold text-lg text-white truncate" th:text="${item.name}"></h3>
						<span class="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded border border-slate-600 whitespace-nowrap" th:text="${item.categoryName}"></span>
					</div>
					<div class="relative w-full pt-[100%] overflow-hidden bg-white/10 flex-grow">
						<a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="absolute inset-0 flex items-center justify-center p-4">
							<img class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-500 drop-shadow-xl" th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
							<img class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-500 opacity-50" th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
						</a>
					</div>
					<div class="p-4 flex justify-between items-end bg-gradient-to-t from-futureDark/80 to-transparent">
						<div class="text-futureBlue font-extrabold text-xl tracking-wider" th:text="${item.price} + '円'"></div>
						<div class="flex items-center gap-1 bg-black/40 px-2 py-1 rounded-full text-yellow-400 text-sm border border-yellow-400/30">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
							4.5
						</div>
					</div>
				</div>
			</th:block>
		</div>
	</th:block>

</body>

</html>
