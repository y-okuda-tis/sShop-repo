<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body>

	<div class="mb-6 border-l-4 border-futureBlue pl-4">
		<h2 class="text-2xl font-bold text-white tracking-wider" th:text="#{item}+#{title.detail}"></h2>
	</div>

	<div class="bg-futureCard backdrop-blur-md rounded-2xl border border-futureBlue/30 p-6 md:p-10 shadow-lg shadow-futureBlue/10" th:object="${item}">
		<div class="flex flex-col md:flex-row gap-10">
			<!-- Image Section -->
			<div class="w-full md:w-1/2 bg-white/5 rounded-xl p-6 flex items-center justify-center border border-white/10 relative group overflow-hidden">
				<div class="absolute inset-0 bg-gradient-to-tr from-futureBlue/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
				<img class="max-w-full max-h-[400px] object-contain drop-shadow-2xl transition-transform duration-500 group-hover:scale-105" th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}"></img>
				<img class="max-w-full max-h-[400px] object-contain opacity-50" th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}"></img>
			</div>

			<!-- Detail Section -->
			<div class="w-full md:w-1/2 flex flex-col justify-between">
				<div>
					<div class="flex items-center gap-3 mb-2">
						<span class="bg-futureBlue/20 text-futureBlue text-xs font-bold px-3 py-1 rounded-full border border-futureBlue/30" th:text="*{categoryName}"></span>
						<div class="flex items-center gap-1 text-yellow-400 text-sm">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
							4.5 <span class="text-slate-500 ml-1">(128 reviews)</span>
						</div>
					</div>

					<h3 class="text-3xl md:text-4xl font-extrabold text-white mb-6 leading-tight" th:text="*{name}"></h3>

					<div class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-futureBlue to-white mb-6">
						<span th:text="*{price}"></span><span class="text-xl ml-1 text-slate-300">円</span>
					</div>

					<div class="mb-8">
						<h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{data.description}"></h4>
						<p class="text-slate-200 leading-relaxed" th:text="*{description}"></p>
					</div>

					<div class="mb-8 flex items-center gap-3 border-t border-b border-slate-700/50 py-4">
						<span class="text-slate-400 font-bold" th:text="#{data.item.stock} + ':'"></span>
						<span class="px-3 py-1 rounded text-sm font-bold bg-green-500/20 text-green-400 border border-green-500/30" th:if="*{stock > 5}" th:text="#{data.in.stock}"></span>
						<span class="px-3 py-1 rounded text-sm font-bold bg-orange-500/20 text-orange-400 border border-orange-500/30" th:if="*{stock >= 1 and 5 >= stock }" th:text="#{data.in.stock} + ' (' + *{stock} + '点)'"></span>
						<span class="px-3 py-1 rounded text-sm font-bold bg-red-500/20 text-red-400 border border-red-500/30" th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></span>
					</div>
				</div>

				<div class="flex flex-col sm:flex-row gap-4 mt-auto pt-4">
					<form th:action="@{/client/basket/add}" method="post" class="flex-1" th:if="*{stock > 0}">
						<input type="hidden" th:field="*{id}" />
						<button type="submit" class="w-full bg-futureBlue hover:bg-white text-futureDark font-extrabold py-4 px-6 rounded-xl transition-all duration-300 shadow-[0_0_15px_rgba(0,240,255,0.4)] hover:shadow-[0_0_25px_rgba(255,255,255,0.8)] flex justify-center items-center gap-2">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
							買い物かごに入れる
						</button>
					</form>
					<form th:action="@{/client/item/list/1}" method="post" th:class="${item.stock > 0 ? 'sm:w-1/3' : 'w-full'}">
						<button type="submit" class="w-full bg-transparent border-2 border-slate-600 text-slate-300 hover:border-white hover:text-white font-bold py-4 px-6 rounded-xl transition-all duration-300">
							戻る
						</button>
					</form>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
