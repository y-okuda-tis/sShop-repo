<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(title,body)">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" type="text/css" th:href="@{/css/layout.css}" />
<link rel="stylesheet" type="text/css" th:href="@{/css/stylesheet.css}" />
<title th:replace="${title}">シェアードショップ</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          futureBlue: "#00f0ff",
          futureDark: "#0a192f",
          futureCard: "rgba(10, 25, 47, 0.7)",
        }
      }
    }
  }
</script>
</head>
<body class="admin bg-futureDark text-slate-200 min-h-screen flex flex-col font-sans">
	<!--/* ヘッダー */-->
	<header>
		<div th:replace="~{common/header :: layout-header}"></div>
	</header>
	<div class="max-w-6xl mx-auto w-full px-4 flex-grow flex flex-col md:flex-row gap-6 my-6">
		<!--/* サイドバー */-->
		<aside th:replace="~{common/sidebar :: layout-sidebar}">
		</aside>
		<!--/* メイン */-->
		<article class="flex-grow w-full">
			<div th:replace="${body}"></div>
		</article>
	</div>
	<!--/* フッター */-->
	<footer>
		<div th:replace="~{common/footer :: layout-footer}"></div>
	</footer>
</body>
</html>
